<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Search</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      padding: 36px 16px;
    }
    .wrap { max-width: 820px; margin: 0 auto; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; color: #fff; }

    .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-row input {
      flex: 1;
      background: #161616;
      border: 1px solid #252525;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      padding: 13px 16px;
      outline: none;
    }
    .search-row input:focus { border-color: #444; }
    .search-row input::placeholder { color: #444; }
    .btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:disabled { opacity: 0.45; cursor: default; }

    .status { font-size: 0.82rem; color: #555; margin-bottom: 16px; min-height: 18px; }
    .status.err { color: #f87171; }
    .status.ok { color: #4ade80; }
    .status.loading { color: #60a5fa; }

    .results { display: flex; flex-direction: column; gap: 10px; }

    .card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .card-title { font-size: 0.92rem; font-weight: 600; color: #eee; margin-bottom: 6px; }
    .card-meta {
      font-size: 0.76rem; color: #555;
      display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .btn-add {
      background: #0f2010;
      border: 1px solid #1e4020;
      color: #4ade80;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-add:hover { background: #152a18; }
    .btn-add:disabled { opacity: 0.4; cursor: default; }

    .card-progress { font-size: 0.76rem; color: #60a5fa; margin-top: 8px; }
    .card-progress.err { color: #f87171; }

    .files { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .file {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-radius: 7px;
      padding: 8px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .file-name { flex: 1; font-size: 0.78rem; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { font-size: 0.74rem; color: #444; white-space: nowrap; }
    .file-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-copy {
      background: #1e293b; border: 1px solid #334155; color: #94a3b8;
      border-radius: 5px; padding: 4px 10px; font-size: 0.74rem; cursor: pointer;
    }
    .btn-copy:hover { color: #e2e8f0; }
    .btn-vlc {
      background: #1a0f00; border: 1px solid #7c3800; color: #fb923c;
      border-radius: 5px; padding: 4px 10px; font-size: 0.74rem;
      text-decoration: none; white-space: nowrap;
    }
    .btn-vlc:hover { background: #271600; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Stream Search</h1>
  <div class="search-row">
    <input id="q" placeholder="Название фильма или сериала..." onkeydown="if(event.key==='Enter')doSearch()" />
    <button class="btn" id="searchBtn" onclick="doSearch()">Найти</button>
  </div>
  <div class="status" id="status"></div>
  <div class="results" id="results"></div>
</div>

<script>
  const API = '';

  function st(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  async function doSearch() {
    const q = document.getElementById('q').value.trim();
    if (!q) { st('Введи название', 'err'); return; }

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    st('Поиск...', 'loading');
    document.getElementById('results').innerHTML = '';

    try {
      const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || res.status);
      if (!data.results.length) { st('Ничего не найдено', 'err'); return; }
      st(`Найдено: ${data.results.length}`, 'ok');
      render(data.results);
    } catch (e) {
      st('Ошибка: ' + e.message, 'err');
    } finally {
      btn.disabled = false;
    }
  }

  function render(items) {
    const wrap = document.getElementById('results');
    items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.id = `c${i}`;
      card.innerHTML = `
        <div class="card-title">${esc(item.title)}</div>
        <div class="card-meta">
          <span>💾 ${fmt(item.size)}</span>
          <span>▲ ${item.seeders} сид</span>
          <span>▼ ${item.peers} лич</span>
        </div>
        <button class="btn-add" onclick="addTorrent(${i})">▶ Смотреть</button>
        <div class="card-progress" id="p${i}"></div>
        <div class="files" id="f${i}"></div>
      `;
      card.dataset.magnet = item.magnet;
      card.dataset.title = item.title;
      wrap.appendChild(card);
    });
  }

  async function addTorrent(i) {
    const card = document.getElementById(`c${i}`);
    const btn = card.querySelector('.btn-add');
    btn.disabled = true;
    progress(i, 'Добавляю в TorrServe...');

    try {
      const res = await fetch(`${API}/add`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ magnet: card.dataset.magnet, title: card.dataset.title }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || res.status);
      progress(i, '');
      renderFiles(i, data.files);
    } catch (e) {
      progress(i, 'Ошибка: ' + e.message, true);
      btn.disabled = false;
    }
  }

  function renderFiles(i, files) {
    const wrap = document.getElementById(`f${i}`);
    wrap.innerHTML = '';
    files.forEach(f => {
      const row = document.createElement('div');
      row.className = 'file';
      row.innerHTML = `
        <span class="file-name" title="${esc(f.name)}">${esc(f.name)}</span>
        <span class="file-size">${fmt(f.size)}</span>
        <div class="file-btns">
          <button class="btn-copy" onclick="copy('${f.stream_url.replace(/'/g,"\\'")}', this)">Копировать</button>
          <a class="btn-vlc" href="vlc://${esc(f.stream_url)}">VLC</a>
        </div>
      `;
      wrap.appendChild(row);
    });
  }

  function progress(i, msg, isErr = false) {
    const el = document.getElementById(`p${i}`);
    el.textContent = msg;
    el.className = 'card-progress' + (isErr ? ' err' : '');
  }

  function copy(url, btn) {
    navigator.clipboard.writeText(url).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Скопировано';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }

  function fmt(b) {
    if (!b) return '?';
    if (b > 1e9) return (b / 1e9).toFixed(1) + ' GB';
    if (b > 1e6) return (b / 1e6).toFixed(0) + ' MB';
    return (b / 1e3).toFixed(0) + ' KB';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
